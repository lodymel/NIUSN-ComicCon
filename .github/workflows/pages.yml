# Builds the embedded map (Vite), stages static files, publishes to GitHub Pages.
# map bundle is produced once then passed to the deploy job via artifact (same bits that `npm run build` emits locally).
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-map:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: uploads/niusn-map/package-lock.json

      - name: Build embedded map (Vite)
        run: npm run build

      - name: Upload map bundle
        uses: actions/upload-artifact@v4
        with:
          name: niusn-map-dist
          path: uploads/niusn-map/dist

  deploy:
    needs: build-map
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built map bundle
        uses: actions/download-artifact@v4
        with:
          name: niusn-map-dist
          path: uploads/niusn-map/dist

      - name: Stage site (exclude dev folders)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='uploads/niusn-map/node_modules' \
            --exclude='_site' \
            . _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
